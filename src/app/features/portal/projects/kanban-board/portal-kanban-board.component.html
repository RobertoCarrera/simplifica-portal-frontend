<div class="h-full flex flex-col bg-gray-50 dark:bg-gray-900 overflow-hidden">
  <!-- Board -->
  <div class="flex-1 overflow-x-auto overflow-y-hidden pt-4">
    <div class="flex h-full p-6 space-x-6 min-w-max">
      <!-- Columns -->
      @for (column of columns; track column.stage.id) {
        <div class="flex flex-col w-80 bg-gray-100 dark:bg-gray-800/50 rounded-xl max-h-full">
          <!-- Column Header -->
          <div
            class="p-3 font-medium bg-gray-50 dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center"
          >
            <div class="flex items-center space-x-2 flex-1 min-w-0">
              <div class="flex items-center space-x-1 flex-1 min-w-0">
                <span
                  class="text-sm text-gray-700 dark:text-gray-200 uppercase tracking-wide truncate"
                >
                  {{ column.stage.name }}
                </span>
                <!-- Indicators -->
                @if (column.stage.is_landing) {
                  <span class="text-blue-500 flex-shrink-0" title="Etapa de Aterrizaje (Nuevos)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                      <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                    </svg>
                  </span>
                }
                @if (column.stage.is_default) {
                  <span class="text-blue-500 flex-shrink-0" title="Etapa En Proceso (Por defecto)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                      <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" />
                    </svg>
                  </span>
                }
                @if (column.stage.is_review) {
                  <span class="text-amber-500 flex-shrink-0" title="Etapa de Revisión">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                      <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                    </svg>
                  </span>
                }
                @if (column.stage.is_final) {
                  <span class="text-green-500 flex-shrink-0" title="Etapa Final">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                      <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                  </span>
                }
              </div>
              <span
                class="bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-400 text-xs px-2 py-0.5 rounded-full flex-shrink-0"
                >{{ column.projects.length }}</span
              >
            </div>
          </div>
          <!-- Column Body -->
          <div class="flex-1 overflow-y-auto p-3 space-y-3 min-h-[100px]">
            @for (project of column.projects; track project.id) {
              <div (click)="onCardClick(project)" class="cursor-pointer group">
                <app-portal-project-card
                  [project]="project"
                ></app-portal-project-card>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</div>
