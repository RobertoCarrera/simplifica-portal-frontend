<div class="h-full flex flex-col bg-gray-50 dark:bg-gray-900">
  <!-- Header with Views & Filters -->
  <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
    <!-- Top Row: Title, Views -->
    <div class="px-6 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div class="flex items-center space-x-4">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Proyectos</h1>

        <!-- View Switcher -->
        <div class="flex bg-gray-100 dark:bg-gray-700 rounded-lg p-1">
          <button
            (click)="toggleView('kanban')"
            [class.bg-white]="currentView === 'kanban'"
            [class.text-blue-600]="currentView === 'kanban'"
            [class.shadow-sm]="currentView === 'kanban'"
            [class.dark:bg-gray-600]="currentView === 'kanban'"
            [class.dark:text-blue-400]="currentView === 'kanban'"
            class="px-3 py-1.5 text-xs font-medium rounded-md text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all"
          >
            Tablero
          </button>
          <button
            (click)="toggleView('timeline')"
            [class.bg-white]="currentView === 'timeline'"
            [class.text-blue-600]="currentView === 'timeline'"
            [class.shadow-sm]="currentView === 'timeline'"
            [class.dark:bg-gray-600]="currentView === 'timeline'"
            [class.dark:text-blue-400]="currentView === 'timeline'"
            class="px-3 py-1.5 text-xs font-medium rounded-md text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all"
          >
            Cronograma
          </button>
          <button
            (click)="toggleView('list')"
            [class.bg-white]="currentView === 'list'"
            [class.text-blue-600]="currentView === 'list'"
            [class.shadow-sm]="currentView === 'list'"
            [class.dark:bg-gray-600]="currentView === 'list'"
            [class.dark:text-blue-400]="currentView === 'list'"
            class="px-3 py-1.5 text-xs font-medium rounded-md text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-all"
          >
            Tabla
          </button>
        </div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="px-6 pb-4 flex items-center space-x-4 flex-wrap gap-y-2">
      <!-- Search -->
      <div class="relative w-full md:w-64">
        <input
          type="text"
          [(ngModel)]="searchText"
          (ngModelChange)="searchText = $event"
          placeholder="Buscar por nombre..."
          class="w-full pl-9 pr-3 py-1.5 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 dark:text-gray-200 placeholder-gray-400 transition-colors"
        />
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>

      <!-- Priority Filter -->
      <div class="relative w-full md:w-40">
        <select
          [(ngModel)]="selectedPriority"
          (ngModelChange)="selectedPriority = $event"
          class="w-full pl-3 pr-8 py-1.5 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 dark:text-gray-200 appearance-none cursor-pointer transition-colors"
        >
          <option [ngValue]="null">Prioridad: Todas</option>
          <option value="low">Baja</option>
          <option value="medium">Media</option>
          <option value="high">Alta</option>
          <option value="critical">Crítica</option>
        </select>
        <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none text-gray-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>
      </div>

      <!-- Deadline Filter -->
      <div class="relative w-full md:w-48">
        <select
          [(ngModel)]="selectedDeadline"
          (ngModelChange)="selectedDeadline = $event"
          class="w-full pl-3 pr-8 py-1.5 text-sm bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-700 dark:text-gray-200 appearance-none cursor-pointer transition-colors"
        >
          <option [ngValue]="null">Fecha: Todas</option>
          <option value="overdue">Vencidos</option>
          <option value="today">Para hoy</option>
          <option value="week">Esta semana (7 días)</option>
          <option value="month">Este mes (30 días)</option>
        </select>
        <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none text-gray-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>
      </div>

      <!-- Clear Filters -->
      @if (hasFilters()) {
        <button
          (click)="clearFilters()"
          class="text-sm text-red-500 hover:text-red-700 transition-colors font-medium whitespace-nowrap"
        >
          Limpiar filtros
        </button>
      }
    </div>
  </div>

  <!-- Content Area -->
  <div class="flex-1 overflow-hidden relative">
    @if (loading()) {
      <div class="p-8 text-center text-gray-500">Cargando proyectos…</div>
    } @else if (filteredProjects().length === 0) {
      <div class="p-8 text-center text-gray-500">No se encontraron proyectos.</div>
    } @else {
      @if (currentView === 'kanban') {
        <app-portal-kanban-board
          [projects]="filteredProjects()"
          [stages]="stages()"
          class="h-full block"
        ></app-portal-kanban-board>
      }

      @if (currentView === 'timeline') {
        <app-portal-timeline-view
          [projects]="filteredProjects().map(asTimelineProject)"
          class="h-full block overflow-auto bg-gray-50 dark:bg-gray-900"
        ></app-portal-timeline-view>
      }

      @if (currentView === 'list') {
        <app-portal-list-view
          [projects]="filteredProjects().map(asListProject)"
          [stages]="stages().map(asListStage)"
          class="h-full block overflow-hidden"
        ></app-portal-list-view>
      }
    }
  </div>
</div>
